<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Orbitron:wght@400..900&display=swap"
        rel="stylesheet">


</head>

<body>
    <div class="container">
        <header></header>
        <div class="sidebar">
            <div class="primaryButton">
                <button class="add">
                    <span class="material-symbols-outlined">
                        add
                    </span>
                    <span>Add Task</span>
                    
                </button>
                <button class="home">
                    <span class="material-symbols-outlined">
                        home
                    </span>
                    <span>Home</span>
                    <span class="homeCount count">2</span>
                </button>
                <button class="todayTask">
                    <span class="material-symbols-outlined">
                        <span>today</span>
                    </span>
                    <span>Today</span>
                    <span class="todayCount count">2</span>
                </button>
                <button class="upcomingTask">
                    <span class="material-symbols-outlined">
                        event_upcoming
                    </span>
                    <span>Upcoming</span>
                    <span class="upcomingCount count">2</span>
                </button>
                <button class="importantTask" style="display: flex;">
                    <span class="material-symbols-outlined">
                        priority
                    </span>
                    <span>Important</span>
                    <span class="importantCount count">2</span>
                </button>
                <button class="completeTask">
                    <span class="material-symbols-outlined">
                        check_circle
                    </span>
                    <span>Completed</span>
                    <span class="completedCount count">2</span>
                </button>
            </div>

            <div class="projects">
                <div class="projectTitle">
                    <span>My Lists</span>
                    <div class="groupAddMinimize">
                        <button class="addProject" id="openModal">
                            <span class="material-symbols-outlined">
                                add
                            </span>
                        </button>
                        <button class="minimize">
                            <span class="material-symbols-outlined iconMin">
                                keyboard_arrow_down
                            </span>
                        </button>
                    </div>

                </div>
                <div class="addedProjects">
                </div>
            </div>
        </div>
        <div class="content">
            <div class="wrapper">
                <h1 class="title"></h1>
                <div class="tasks"></div>
                <div class="addButton"></div>
            </div>
            <!-- ADD TASK MODAL -->
            <div class="addTaskModalContainer" id="addTaskModalContainer">
                <div class="addTaskModal">
                    <form class="AddTaskForm">
                        <textarea class="title" type="text" name="title" placeholder="What to do?" maxlength="500"
                            required></textarea>
                        <textarea class="descrip" type="text" name="descrip" placeholder="Description"></textarea>
                        <input type="date" name="date" placeholder="DD-MM-YYYY">
                        <select name="priority" id="priority">
                            <option value="high">High</option>
                            <option value="medium">Medium</option>
                            <option value="low">Low</option>
                            <option value="" selected>Priority</option>
                        </select>
                        <div class="line"></div>
                        <div class="modalButton">
                            <button id="cancel">Cancel</button>
                            <button type="submit">Add Task</button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
        <!-- Creating new Project modal -->
        <div class="modal" id="modal">
            <div class="modal-overlay"></div>

            <div class="modal-content">
                <button class="close-btn" id="closeModal">&times;</button>

                <form id="projectForm">
                    <label for="newProject">
                        <h1>New Project</h1>
                    </label><br>
                    <input type="text" id="newProject">
                    <!-- <input type="color" id="colorPicker"> -->
                    <button type="submit">Create</button>
                </form>

            </div>
        </div>

    </div>

    <!-- Details Modal -->

    <div class="detailsModal" id="detailsModal">
        <div class="modalOverlay"></div>
        <div class="modal-content">
            <button class="close-btn" id="closeDetailsModal">&times;</button>
            <form class="showDetailsForm">
                <div class="groupRadioTitleDesc">
                    <!-- <input type="radio" name="isDone" class="isDoneDetail"> -->
                    <div class="titleDescrip">
                        <textarea class="title" type="text" name="title" placeholder="What to do?" required></textarea>
                        <textarea class="descrip" type="text" name="descrip" placeholder="Description"></textarea>
                    </div>
                </div>
                <div class="buttons">
                    <div class="ProjectName">
                        <select name="project" id="project">
                            <option value="" selected>Project</option>
                        </select>
                    </div>
                    <div class="date"><input type="date" name="date" placeholder="DD-MM-YYYY"></div>
                    <div class="prio">
                        <select name="priority" id="priority">
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                            <option value="" selected>Priority</option>
                        </select>
                    </div>
                </div>
                <div class="line"></div>
                <div class="modalButton">
                    <button id="delete">Delete</button>
                    <button type="submit" id="saveChange">Save Changes</button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
