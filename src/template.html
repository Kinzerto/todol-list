<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
</head>

<body>
    <div class="container">
        <header></header>
        <div class="sidebar">
            <button class="addTask">
                <span class="addIcon"></span>
                All Tasks
            </button>
            <button class="todayTask">
                <span class="todayIcon"></span>
                Today
            </button>
            <button class="upcomingTask">
                <span class="upcomingIcon"></span>
                Upcoming
            </button>
            <button class="completeTask">
                <span class="completeIcon"></span>
                Completed
            </button>
            <button class="importantTask" style="display: flex;">
                <span class="importantIcon"></span>
                Important
            </button>

            <div class="projects">
                <div class="projectTitle">
                    <span>My Projects</span>
                    <button class="addProject" id="openModal">
                        <span>&#xFF0B</span>
                    </button>
                </div>
                <div class="addedProjects">
                </div>
            </div>
        </div>
        <div class="content">
            <h1 class="title"></h1>
            <div class="tasks"></div>
            <div class="addButton"></div>
            <!-- ADD TASK MODAL -->
            <div class="addTaskModalContainer" id="addTaskModalContainer">
                <div class="addTaskModal">
                    <form class="AddTaskForm">
                        <textarea class="title" type="text" name="title" placeholder="What to do?"></textarea>
                        <textarea class="descrip" type="text" name="descrip" placeholder="Description"></textarea>
                        <input type="date" name="date" placeholder="DD-MM-YYYY">
                        <select name="priority" id="priority">
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                            <option value="" selected>Priority</option>
                        </select>
                        <div class="line"></div>
                        <div class="modalButton">
                            <button id="cancel">Cancel</button>
                            <button type="submit">Add Task</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <!-- modal -->
        <div class="modal" id="modal">
            <div class="modal-overlay"></div>

            <div class="modal-content">
                <button class="close-btn" id="closeModal">&times;</button>

                <form id="projectForm">
                    <label for="newProject">
                        <h1>New Project</h1>
                    </label><br>
                    <input type="text" id="newProject">
                    <button type="submit">Create</button>
                </form>

            </div>
        </div>

    </div>
